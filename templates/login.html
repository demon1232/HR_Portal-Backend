<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 THREE JS + VANTA -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 🔥 3D Background */
        #vanta-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* 🔥 Glass Card */
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 35px;
            width: 360px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
            color: white;
            transition: 0.3s;
        }

        .login-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 60px rgba(0,0,0,0.8);
        }

        input {
            border-radius: 12px !important;
            border: none;
        }

        button {
            border-radius: 12px !important;
            font-weight: bold;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
        }

        button:hover {
            background: linear-gradient(45deg, #0072ff, #00c6ff);
        }

        .center-box {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h3 {
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

<!-- 🔥 3D Background -->
<div id="vanta-bg"></div>

<div class="center-box">
    <form method="POST" class="login-card">
        {% csrf_token %}

        <h3 class="text-center mb-4">HR Portal</h3>

        <input type="text" name="username" class="form-control mb-3" placeholder="Username">
        <input type="password" name="password" class="form-control mb-4" placeholder="Password">

        <button class="btn w-100">Login</button>
    </form>
</div>

<!-- 🔥 VANTA CONFIG -->
<script>
VANTA.NET({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  scaleMobile: 1.00,
  color: 0x00c6ff,
  backgroundColor: 0x0f2027,
  points: 12.00,
  maxDistance: 20.00,
  spacing: 16.00
})
</script>

</body>
</html>
