<!DOCTYPE html>
<html>
<head>
    <title>All Salaries</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .container-box {
            padding: 40px;
        }

        .card-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 15px;
        }

        .header-box {
            margin-bottom: 20px;
        }

        .header-box h2 {
            margin-bottom: 5px;
        }

        .header-box p {
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- HEADER -->
    <div class="header-box">
        <h2>Salary History</h2>
        <p>HR - Monthly Salary Records</p>
    </div>

    <!-- FILTER FORM -->
    <form method="GET" class="d-flex gap-3 mb-4 align-items-center flex-wrap">

        <input type="text" name="name" class="form-control"
               placeholder="Search by Employee Name"
               value="{{ request.GET.name }}"
               style="max-width: 280px;">

        <select name="month" class="form-control" style="max-width: 200px;">
            <option value="">All Months</option>
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
        </select>

        <div class="ms-auto">
            <button type="submit" class="btn btn-primary px-4 shadow">
                Filter
            </button>
        </div>

    </form>

    <!-- TABLE -->
    <div class="card-box">
        <table class="table table-dark table-striped align-middle">
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Year</th>
                    <th>Salary</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
            {% for r in records %}
            <tr>
                <td>{{ r.month }}</td>
                <td>{{ r.year }}</td>
                <td>Rs {{ r.total }}</td>
                <td>{{ r.employee.user.username }}</td>

                <!-- ✅ FIXED ACTION COLUMN -->
                <td>
                    <a href="{% url 'download_payslip' r.id %}" class="btn btn-success btn-sm">
                         Download
                    </a>

                    <a href="{% url 'delete_salary' r.id %}" 
                       onclick="return confirm('Delete this record?')"
                       class="btn btn-danger btn-sm ms-2">
                        Delete
                    </a>
                </td>

            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">
                    No salary records found
                </td>
            </tr>
            {% endfor %}
            </tbody>

        </table>
    </div>

    <!-- BACK BUTTON -->
    <div class="mt-3">
        <a href="/hr/" class="btn btn-info">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
