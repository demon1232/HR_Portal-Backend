<!DOCTYPE html>
<html>
<head>
    <title>HR Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            font-family: 'Poppins', sans-serif;
            color: #e2e8f0;
        }

        .sidebar {
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            padding: 25px 15px;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            color: #94a3b8;
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            align-items: center;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        .sidebar a.active {
            background: #2563eb;
            color: white;
        }

        .content {
            margin-left: 240px;
            padding: 25px;
        }

        .topbar {
            background: #1e293b;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

{% with request.resolver_match.url_name as url_name %}

<div class="sidebar">
    <h4 class="mb-4">HR Portal</h4>

    <!-- Dashboard -->
    <a href="{% url 'hr_dashboard' %}" class="{% if url_name == 'hr_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <!-- Attendance -->
    <a href="{% url 'hr_attendance' %}" class="{% if url_name == 'hr_attendance' %}active{% endif %}">
        <i class="bi bi-calendar-check"></i> Attendance
    </a>

    <!-- Leaves -->
    <a href="{% url 'hr_leaves' %}" class="{% if url_name == 'hr_leaves' %}active{% endif %}">
        <i class="bi bi-file-earmark-text"></i> Leaves
    </a>

    {% if user.is_hr %}
    <!-- Add Employee -->
    <a href="{% url 'add_employee' %}" class="{% if url_name == 'add_employee' %}active{% endif %}">
        <i class="bi bi-person-plus"></i> Add Employee
    </a>

    <!-- All Payslips -->
    <a href="{% url 'all_salary' %}" class="{% if url_name == 'all_salary' %}active{% endif %}">
        <i class="bi bi-receipt"></i> All Payslips
    </a>
    {% endif %}

    <!-- My Payslip -->
    <a href="{% url 'my_salary' %}" class="{% if url_name == 'my_salary' %}active{% endif %}">
        <i class="bi bi-wallet2"></i> My Payslip
    </a>

    <!-- Logout -->
    <a href="{% url 'logout' %}" class="btn btn-danger mt-3 w-100">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</div>

{% endwith %}

<div class="content">

    <div class="topbar d-flex justify-content-between">
        <h6>Welcome, {{ user.username }}</h6>
        <span class="text-muted">HR System</span>
    </div>

    {% block content %}{% endblock %}

</div>

</body>
</html>
