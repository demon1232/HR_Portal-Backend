<!DOCTYPE html>
<html>
<head>
    <title>HR Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: #cbd5f5;
            display: block;
            margin: 12px 0;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: white;
        }
        .card {
            border-radius: 12px;
        }
        .logout-btn {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 sidebar">
            <h4>HR Portal</h4>
            <hr>

            <a href="/hr/">Dashboard</a>

            {% if user.is_hr %}
            <a href="/add-employee/">Add Employee</a>
            {% endif %}

            <!-- ✅ FINAL LOGOUT (NO CSRF ISSUE) -->
            <a href="{% url 'logout' %}" 
               class="btn btn-danger logout-btn"
               onclick="return confirm('Are you sure you want to logout?')">
               Logout
            </a>

        </div>

        <!-- Content -->
        <div class="col-10 p-4">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

</body>
</html>
