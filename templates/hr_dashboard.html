<!DOCTYPE html>
<html>
<head>
    <title>HR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f2027;
            color: white;
        }

        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            background: #111;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #00c6ff;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .card-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>HR Panel</h4>
    <a href="#">Dashboard</a>
    <a href="{% url 'add_employee' %}">Add Employee</a>
    <a href="{% url 'logout' %}">Logout</a>
</div>

<div class="main">

    <h2>Dashboard</h2>

    <!-- 🔥 Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card-box">
                <h5>Total Employees</h5>
                <h3>{{ employees.count }}</h3>
            </div>
        </div>
    </div>

    <!-- 🔥 Table -->
    <table class="table table-dark table-striped">
        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Action</th>
        </tr>

        {% for emp in employees %}
        <tr>
            <td>{{ emp.user.username }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.salary }}</td>
            <td>
                <a href="{% url 'edit_employee' emp.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'delete_employee' emp.id %}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
