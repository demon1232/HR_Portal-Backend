<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <!-- 🔥 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        /* 🔥 TOPBAR */
        .topbar {
            padding: 14px 30px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #00c6ff;
        }

        .logout-btn {
            background: #ff4d4d;
            border: none;
            font-size: 14px;
            padding: 6px 14px;
        }

        /* 🔥 CONTENT */
        .container-box {
            padding: 40px;
        }

        /* 🔥 CARD STYLE */
        .card-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            transition: 0.3s ease;
        }

        .card-box:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .title {
            font-size: 14px;
            opacity: 0.7;
        }

        .value {
            font-size: 20px;
            font-weight: 600;
        }

        /* 🔥 PROFILE */
        .profile {
            text-align: center;
        }

        .profile img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .profile h5 {
            margin-bottom: 5px;
            font-weight: 500;
        }

        .profile p {
            opacity: 0.7;
            font-size: 14px;
        }

    </style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="topbar">
    <h2>Employee Dashboard</h2>
    <a href="{% url 'logout' %}" class="btn logout-btn">Logout</a>
</div>

<div class="container-box">

    <div class="row">

        <!-- 👤 PROFILE -->
        <div class="col-md-4">
            <div class="card-box profile">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <h5>{{ employee.user.username }}</h5>
                <p>{{ employee.department }}</p>
            </div>
        </div>

        <!-- 📊 DETAILS -->
        <div class="col-md-8">
            <div class="row">

                <div class="col-md-6">
                    <div class="card-box">
                        <div class="title">Salary</div>
                        <div class="value">Rs {{ employee.salary }}</div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-box">
                        <div class="title">Joining Date</div>
                        <div class="value">{{ employee.joining_date }}</div>
                    </div>
                </div>

                <div class="col-md-12">
                    <div class="card-box">
                        <div class="title">Department</div>
                        <div class="value">{{ employee.department }}</div>
                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
