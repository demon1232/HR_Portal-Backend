<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .form-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        input {
            border-radius: 10px !important;
            border: none;
        }

        button {
            border-radius: 10px !important;
            font-weight: bold;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .error {
            color: #ff6b6b;
            font-size: 14px;
        }
    </style>
</head>

<body>

<form method="POST" class="form-box">
    {% csrf_token %}

    <h3>Add Employee</h3>

    <!-- 🔥 Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-warning">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

    <input type="text" name="department" class="form-control mb-3" placeholder="Department" required>

    <input type="number" name="salary" class="form-control mb-3" placeholder="Salary" required>

    <input type="date" name="joining_date" class="form-control mb-4" required>

    <button class="btn btn-primary w-100">Add Employee</button>

    <a href="{% url 'hr_dashboard' %}" class="btn btn-light w-100 mt-2">Back</a>

</form>

</body>
</html>
