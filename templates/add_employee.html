<!DOCTYPE html>
<html>
<head>
    <title>{% if employee %}Edit Employee{% else %}Add Employee{% endif %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .form-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        input {
            border-radius: 10px !important;
            border: none;
        }

        button {
            border-radius: 10px !important;
            font-weight: bold;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<form method="POST" 
      action="{% if employee %}{% url 'edit_employee' employee.id %}{% else %}{% url 'add_employee' %}{% endif %}" 
      class="form-box">

{% csrf_token %}

<h3>
    {% if employee %}Edit Employee{% else %}Add Employee{% endif %}
</h3>

<!-- ✅ Username FIXED -->
<input type="text" name="username" class="form-control mb-3"
       value="{% if employee %}{{ employee.user.username }}{% endif %}"
       placeholder="Username" required>

<!-- Department -->
<input type="text" name="department" class="form-control mb-3"
       value="{{ employee.department|default:'' }}"
       placeholder="Department" required>

<!-- Salary -->
<input type="number" name="salary" class="form-control mb-3"
       value="{{ employee.salary|default:'' }}"
       placeholder="Salary" required>

<!-- Joining Date -->
<input type="date" name="joining_date" class="form-control mb-4"
       value="{{ employee.joining_date|date:'Y-m-d' }}"
       required>

<!-- Button -->
<button class="btn btn-primary w-100">
    {% if employee %}Update Employee{% else %}Add Employee{% endif %}
</button>

<a href="{% url 'hr_dashboard' %}" class="btn btn-light w-100 mt-2">Back</a>

</form>

</body>
</html>
