{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 text-center">

    <h3>Scan RFID Card</h3>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="rfid" autofocus class="form-control mt-3" placeholder="Scan card here">
    </form>

</div>

<script>
document.querySelector("input").addEventListener("change", function(){
    this.form.submit();
});
</script>

{% endblock %}
