{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">Terminated Employees</h3>

    <div class="card shadow-lg p-3" style="border-radius:15px;">

        <table class="table table-dark table-hover align-middle">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
            {% for emp in employees %}
            <tr>

                <td>{{ emp.user.username }}</td>
                <td>{{ emp.department }}</td>
                <td>Rs {{ emp.salary }}</td>

                <td>
                    <a href="{% url 'reactivate_employee' emp.id %}" 
                       class="btn btn-success btn-sm"
                       onclick="return confirm('Reactivate employee?')">
                       Reactivate
                    </a>
                </td>

            </tr>
            {% endfor %}
            </tbody>

        </table>

    </div>

</div>

{% endblock %}
